<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best of Luck Vaishnavi 🩵</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
}

/* center message */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

h1{
font-size:48px;
}

p{
font-size:22px;
}

/* flowers */
.flower{
position:absolute;
font-size:28px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* button */
button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff3b6b;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff174f;
}

.heart{
position:absolute;
font-size:30px;
}
</style>
</head>

<body>

<!-- Romantic Music -->
<audio autoplay loop>
<source src="love.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h1>Good Luck Vaishnavi 🪷</h1>

<p>
Rahul believes in you 🫂<br>
All the best for your <b>ANATOMY PAPER II</b> exam 🌹<br>
You are going to do amazing!
</p>

<button onclick="explode()">Click For Love 💕</button>
</div>

<script>

/* falling lotus & roses */
function createFlower(){

const flower=document.createElement("div");
flower.classList.add("flower");

const items=["🪷","🌹"];
flower.innerHTML=items[Math.floor(Math.random()*items.length)];

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);

}

setInterval(createFlower,400);


/* BIG HEART EXPLOSION */
function explode(){

for(let i=0;i<120;i++){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="🩵";

heart.style.left="50vw";
heart.style.top="50vh";

document.body.appendChild(heart);

const angle=Math.random()*2*Math.PI;
const distance=200+Math.random()*300;

const x=Math.cos(angle)*distance;
const y=Math.sin(angle)*distance;

heart.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:2000,
easing:"ease-out"
});

setTimeout(()=>heart.remove(),2000);

}

}

</script>

</body>
</html>
